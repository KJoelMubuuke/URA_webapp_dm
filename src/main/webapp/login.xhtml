<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui">
<h:head>
    <title>URA | Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body {
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            background: radial-gradient(ellipse at 60% 20%, #1a2f5a 0%, #0d1117 60%);
        }
        .login-wrap { width: 420px; }
        .login-header { text-align: center; margin-bottom: 2rem; }
        .login-header .logo { font-size: 3rem; margin-bottom: 0.5rem; }
        .login-header h1 { font-size: 1.5rem; font-weight: 700; color: #e6edf3; }
        .login-header p  { font-size: 0.85rem; color: #8b949e; margin-top: 0.25rem; }
        .login-card {
            background: #161b22; border: 1px solid #21262d; border-radius: 14px;
            padding: 2rem; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .form-group { margin-bottom: 1.25rem; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: 500; color: #8b949e; margin-bottom: 0.4rem; }
        .form-group .ui-inputtext {
            width: 100%; background: #0d1117 !important; border: 1px solid #30363d !important;
            border-radius: 8px !important; color: #e6edf3 !important; padding: 0.7rem 0.9rem !important;
            font-size: 0.9rem !important; transition: border-color 0.2s !important;
        }
        .form-group .ui-inputtext:focus { border-color: #58a6ff !important; outline: none !important; }
        .btn-login {
            width: 100%; background: linear-gradient(135deg, #1f6feb, #388bfd) !important;
            border: none !important; border-radius: 8px !important; padding: 0.75rem !important;
            font-size: 0.95rem !important; font-weight: 600 !important; cursor: pointer !important;
            transition: opacity 0.2s !important; margin-top: 0.5rem;
        }
        .btn-login:hover { opacity: 0.88 !important; }
        .login-footer { text-align: center; margin-top: 1.25rem; font-size: 0.82rem; color: #8b949e; }
        .login-footer a { color: #58a6ff; text-decoration: none; }
        .login-footer a:hover { text-decoration: underline; }
    </style>
</h:head>
<h:body>
    <div class="login-wrap">
        <div class="login-header">
            <div class="logo">🏛</div>
            <h1>Uganda Revenue Authority</h1>
            <p>Tax Clearance &amp; Management System</p>
        </div>
        <div class="login-card">
            <p:growl id="growl" life="5000" showDetail="true"/>
            <h:form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <p:inputText id="email" value="#{loginBean.email}"
                                 placeholder="Enter your email" required="true"
                                 requiredMessage="Email is required"/>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <p:password id="password" value="#{loginBean.password}"
                                placeholder="Enter your password" feedback="false"
                                required="true" requiredMessage="Password is required"/>
                </div>
                <p:commandButton id="loginBtn" value="Sign In" action="#{loginBean.login}"
                                 styleClass="btn-login" ajax="false" update="growl"/>
            </h:form>
            <div class="login-footer">
                New taxpayer? <a href="/URA_Tax/register.xhtml">Create an account</a>
            </div>
        </div>
    </div>
</h:body>
</html>
