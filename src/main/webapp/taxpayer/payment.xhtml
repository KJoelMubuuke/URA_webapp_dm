<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:p="http://primefaces.org/ui">

<ui:composition template="/WEB-INF/template.xhtml">

    <ui:define name="nav">
        <a href="/URA_Tax/taxpayer/dashboard.xhtml">Dashboard</a>
        <a href="/URA_Tax/taxpayer/declare.xhtml">New Declaration</a>
        <a href="/URA_Tax/taxpayer/payment.xhtml" class="active">Make Payment</a>
    </ui:define>

    <ui:define name="content">
        <h2 style="font-size:1.4rem;font-weight:700;color:#e6edf3;margin-bottom:1.5rem;">Make Payment</h2>

        <div class="ura-card" style="max-width:580px;">
            <div class="ura-card-title">Assessed Taxes Awaiting Payment</div>
            <p:dataTable value="#{paymentBean.payableTaxes}" var="tax" selectionMode="single"
                         selection="#{paymentBean.selectedTaxId}"
                         rowKey="#{tax.id}" emptyMessage="No taxes awaiting payment."
                         style="width:100%;margin-bottom:1.25rem;">
                <p:column headerText="Type"><h:outputText value="#{tax.taxType}"/></p:column>
                <p:column headerText="Period"><h:outputText value="#{tax.period}"/></p:column>
                <p:column headerText="Assessed">
                    <h:outputText value="#{tax.assessedAmount}">
                        <f:convertNumber type="currency" currencySymbol="UGX " minFractionDigits="0"/>
                    </h:outputText>
                </p:column>
                <p:column headerText="Outstanding">
                    <h:outputText value="#{tax.assessedAmount.subtract(tax.amountPaid)}">
                        <f:convertNumber type="currency" currencySymbol="UGX " minFractionDigits="0"/>
                    </h:outputText>
                </p:column>
                <p:column headerText="Status">
                    <h:outputText value="#{tax.status}"/>
                </p:column>
            </p:dataTable>

            <h:form id="payForm">
                <div style="margin-bottom:1rem;">
                    <label style="display:block;font-size:0.8rem;color:#8b949e;margin-bottom:0.4rem;">Select Tax Record ID</label>
                    <p:selectOneMenu value="#{paymentBean.selectedTaxId}" required="true" style="width:100%">
                        <f:selectItem itemLabel="-- Select Tax --" itemValue="#{null}" noSelectionOption="true"/>
                        <f:selectItems value="#{paymentBean.payableTaxes}" var="t"
                                       itemLabel="#{t.taxType} | #{t.period} | Outstanding: UGX #{t.assessedAmount.subtract(t.amountPaid)}"
                                       itemValue="#{t.id}"/>
                    </p:selectOneMenu>
                </div>
                <div style="margin-bottom:1rem;">
                    <label style="display:block;font-size:0.8rem;color:#8b949e;margin-bottom:0.4rem;">Amount to Pay (UGX)</label>
                    <p:inputNumber value="#{paymentBean.amount}" minValue="1" style="width:100%" required="true"/>
                </div>
                <div style="margin-bottom:1.5rem;">
                    <label style="display:block;font-size:0.8rem;color:#8b949e;margin-bottom:0.4rem;">Payment Method</label>
                    <p:selectOneMenu value="#{paymentBean.method}" required="true" style="width:100%">
                        <f:selectItem itemLabel="-- Select Method --" itemValue="#{null}" noSelectionOption="true"/>
                        <f:selectItems value="#{paymentBean.paymentMethods}" var="m" itemLabel="#{m}" itemValue="#{m}"/>
                    </p:selectOneMenu>
                </div>
                <p:commandButton value="💳 Pay Now" action="#{paymentBean.pay}"
                                 ajax="false" styleClass="ui-button-warning"
                                 style="width:100%;padding:0.75rem;font-size:0.95rem;"/>
            </h:form>
        </div>
    </ui:define>

</ui:composition>
</html>
