<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:p="http://primefaces.org/ui">
<h:head>
    <title>URA - Tax Clearance System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: #0d1117; color: #e6edf3; }
        .ura-topbar {
            background: linear-gradient(90deg, #161b22 0%, #1c2128 100%);
            border-bottom: 1px solid #21262d;
            padding: 0 2rem;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky; top: 0; z-index: 100;
        }
        .ura-logo { display: flex; align-items: center; gap: 0.75rem; }
        .ura-logo img { height: 36px; }
        .ura-logo-text { font-size: 1.1rem; font-weight: 700; color: #58a6ff; letter-spacing: 0.5px; }
        .ura-logo-sub { font-size: 0.7rem; color: #8b949e; font-weight: 400; }
        .ura-nav { display: flex; gap: 0.25rem; }
        .ura-nav a {
            color: #8b949e; text-decoration: none; padding: 0.5rem 0.9rem;
            border-radius: 6px; font-size: 0.875rem; transition: all 0.2s;
        }
        .ura-nav a:hover { color: #e6edf3; background: #21262d; }
        .ura-nav a.active { color: #58a6ff; background: #1f3044; }
        .ura-user { display: flex; align-items: center; gap: 1rem; font-size: 0.875rem; }
        .ura-user span { color: #8b949e; }
        .ura-content { padding: 2rem; max-width: 1280px; margin: 0 auto; }
        .ura-card {
            background: #161b22; border: 1px solid #21262d;
            border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem;
        }
        .ura-card-title { font-size: 1rem; font-weight: 600; color: #e6edf3; margin-bottom: 1rem; }
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; }
        .stat-card {
            background: #0d1117; border: 1px solid #21262d; border-radius: 10px;
            padding: 1.25rem; text-align: center;
        }
        .stat-value { font-size: 1.8rem; font-weight: 700; color: #58a6ff; }
        .stat-label { font-size: 0.75rem; color: #8b949e; margin-top: 0.25rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .badge {
            display: inline-block; padding: 0.2rem 0.6rem; border-radius: 20px;
            font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .badge-declared   { background: #1f3a5f; color: #58a6ff; }
        .badge-assessed   { background: #2d2a1e; color: #d29922; }
        .badge-paid       { background: #1a2f1a; color: #3fb950; }
        .badge-rejected   { background: #2d1515; color: #f85149; }
        .badge-partial    { background: #2a1f3a; color: #a371f7; }
        .badge-draft      { background: #21262d; color: #8b949e; }
    </style>
</h:head>
<h:body>
    <div class="ura-topbar">
        <div class="ura-logo">
            <div>
                <div class="ura-logo-text">🏛 URA</div>
                <div class="ura-logo-sub">Uganda Revenue Authority</div>
            </div>
        </div>
        <nav class="ura-nav">
            <ui:insert name="nav"/>
        </nav>
        <div class="ura-user">
            <span>#{sessionBean.fullName}</span>
            <h:form>
                <p:commandButton value="Logout" action="#{sessionBean.logout}"
                                 styleClass="ui-button-secondary ui-button-sm" ajax="false"/>
            </h:form>
        </div>
    </div>
    <div class="ura-content">
        <p:growl id="growl" life="4000" showDetail="true"/>
        <ui:insert name="content"/>
    </div>
</h:body>
</html>
